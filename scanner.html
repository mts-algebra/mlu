<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Sertifikat — MLU</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  :root{--bg:#eef1f5;--card:#fff;--ink:#1f2933;--muted:#6b7785;--line:#e3e8ee;--accent:#2563eb;
    --green:#1a7f4b;--green-bg:#e7f6ed;--red:#c0392b;--red-bg:#fdecea;--amber:#a15c00;--amber-bg:#fff8ef;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.5}
  .wrap{max-width:520px;margin:0 auto;padding:20px}
  h1{font-size:20px;margin:0 0 2px}.muted{color:var(--muted);font-size:13.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px}
  #video{width:100%;border-radius:12px;background:#000;aspect-ratio:1/1;object-fit:cover}
  button{cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;padding:10px 16px;
         background:var(--accent);color:#fff;font-family:inherit}
  button.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  textarea{width:100%;min-height:64px;border:1px solid var(--line);border-radius:8px;padding:9px;
        font-family:ui-monospace,monospace;font-size:12px;margin-top:8px}
  .result{border-radius:12px;padding:16px;margin-top:14px;display:none}
  .result.show{display:block}
  .result.ok{background:var(--green-bg);border:1px solid #bce3cb}
  .result.bad{background:var(--red-bg);border:1px solid #f3c3bd}
  .result .big{font-size:18px;font-weight:800;display:flex;gap:8px;align-items:center}
  .result.ok .big{color:var(--green)} .result.bad .big{color:var(--red)}
  .det{margin-top:8px;font-size:14px}.det span{color:var(--muted)}
  .warn{background:var(--amber-bg);border:1px solid #f0e2cc;color:var(--amber);border-radius:8px;
        padding:9px 11px;font-size:12.5px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔍 Scanner Sertifikat MLU</h1>
  <div class="muted">Arahkan kamera ke QR pada sertifikat siswa untuk memeriksa keasliannya.</div>

  <div class="card">
    <video id="video" playsinline></video>
    <canvas id="canvas" hidden></canvas>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="start">▶ Mulai kamera</button>
      <button class="ghost" id="stop">⏹ Berhenti</button>
    </div>
    <div class="muted" style="margin-top:10px">Tidak bisa pakai kamera? Tempel isi QR di bawah lalu tekan Periksa.</div>
    <textarea id="paste" placeholder='{"n":"...","k":"...","lv":1,"tgl":"...","skor":40,"sig":"..."}'></textarea>
    <button class="ghost" id="check" style="margin-top:8px">Periksa teks</button>
  </div>

  <div class="result" id="result">
    <div class="big" id="r-big"></div>
    <div class="det" id="r-det"></div>
  </div>

  <div id="nokey" class="warn" style="display:none">
    ⚠ Kunci publik belum dipasang. Buka file ini, tempel isi <b>public.jwk.json</b> pada bagian
    <code>PUBLIC_KEY_JWK</code>, lalu muat ulang.
  </div>
</div>

<script>
// ====== TEMPEL KUNCI PUBLIK DI SINI (isi server/keys/public.jwk.json) ======
let PUBLIC_KEY_JWK = null;
// contoh: let PUBLIC_KEY_JWK = {"kty":"EC","crv":"P-256","x":"...","y":"..."};
// ===========================================================================

const $ = (id) => document.getElementById(id);
const enc = new TextEncoder();
const canon = (c) => [c.n, c.k, c.lv, c.tgl, c.skor].join('|');

async function verifyCert(cert) {
  if (!PUBLIC_KEY_JWK) throw new Error('nokey');
  if (!cert || !cert.sig) return { valid: false, cert };
  const key = await crypto.subtle.importKey('jwk', PUBLIC_KEY_JWK, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['verify']);
  const sig = Uint8Array.from(atob(cert.sig), (ch) => ch.charCodeAt(0));
  const valid = await crypto.subtle.verify({ name: 'ECDSA', hash: 'SHA-256' }, key, sig, enc.encode(canon(cert)));
  return { valid, cert };
}

function showResult(valid, cert) {
  const r = $('result'), big = $('r-big'), det = $('r-det');
  r.className = 'result show ' + (valid ? 'ok' : 'bad');
  if (valid) {
    big.textContent = '✅ SERTIFIKAT ASLI';
    det.innerHTML = `<span>Nama:</span> <b>${cert.n}</b> &nbsp;·&nbsp; <span>Kelas:</span> ${cert.k}<br>
      <span>Lulus Level ${cert.lv}</span> · skor ${cert.skor}/40 · ${cert.tgl}`;
  } else {
    big.textContent = '❌ TIDAK VALID / PALSU';
    det.textContent = 'Tanda tangan tidak cocok dengan data. Sertifikat ditolak.';
  }
}

async function handlePayload(text) {
  let cert; try { cert = JSON.parse(text); } catch (e) { showResult(false, null); return; }
  try { const { valid } = await verifyCert(cert); showResult(valid, cert); }
  catch (e) { if (e.message === 'nokey') $('nokey').style.display = 'block'; }
}

// ---- kamera + jsQR ----
let stream = null, raf = null;
async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const v = $('video'); v.srcObject = stream; await v.play(); scanLoop();
  } catch (e) { alert('Tidak bisa mengakses kamera. Gunakan kotak tempel di bawah.'); }
}
function stopCam() { if (raf) cancelAnimationFrame(raf); if (stream) stream.getTracks().forEach((t) => t.stop()); stream = null; }
function scanLoop() {
  const v = $('video'), c = $('canvas');
  if (!stream) return;
  if (v.readyState === v.HAVE_ENOUGH_DATA) {
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0, c.width, c.height);
    const img = ctx.getImageData(0, 0, c.width, c.height);
    const code = window.jsQR && jsQR(img.data, img.width, img.height);
    if (code && code.data) { stopCam(); handlePayload(code.data); return; }
  }
  raf = requestAnimationFrame(scanLoop);
}

$('start').onclick = startCam;
$('stop').onclick = stopCam;
$('check').onclick = () => handlePayload($('paste').value.trim());
if (!PUBLIC_KEY_JWK) $('nokey').style.display = 'block';

// untuk pengujian
window.__scanner = { verifyCert, setPub: (k) => { PUBLIC_KEY_JWK = k; }, handlePayload };
</script>
</body>
</html>
